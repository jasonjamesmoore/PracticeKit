<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/favicon.svg" />
    <meta
      name="viewport"
      content="minimum-scale=1, initial-scale=1, width=device-width, user-scalable=no"
    />
    <script>
      // Prevent flash of unstyled content by setting color scheme before render
      const colorScheme = localStorage.getItem('mantine-color-scheme-value') || 'auto';
      document.documentElement.setAttribute('data-mantine-color-scheme', colorScheme === 'auto' ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : colorScheme);
    </script>
    <title>PracticeKit</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
